<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Cinematic operations environment</title>
  <desc id="desc">A dark systems environment with glowing telemetry walls, layered control surfaces, and emerald signal light.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040807" />
      <stop offset="55%" stop-color="#0b1411" />
      <stop offset="100%" stop-color="#09100e" />
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#4bc09d" stop-opacity="0.42" />
      <stop offset="100%" stop-color="#4bc09d" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="68%" cy="55%" r="45%">
