      <stop offset="50%" stop-color="#a5f0d2" stop-opacity="0.92" />
      <stop offset="100%" stop-color="#8dddc4" stop-opacity="0.16" />
    </linearGradient>
    <filter id="blurLg" x="-30%" y="-30%" width="160%" height="160%">
